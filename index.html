<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - Ved Games Production</title>

<meta name="description" content="Play Flappy Bird online free by Ved Games Production. Tap to fly and avoid pipes!">

<!-- Open Graph (WhatsApp / Instagram / Facebook preview) -->
<meta property="og:title" content="Flappy Bird - Ved Games Production">
<meta property="og:description" content="Play Flappy Bird online free. Simple and addictive browser game.">
<meta property="og:image" content="https://devtiwari-bit.github.io/FLAPPY-BIRD/preview.png">
<meta property="og:url" content="https://devtiwari-bit.github.io/FLAPPY-BIRD/">
<meta property="og:type" content="website">

<!-- Twitter preview (also works sometimes for sharing apps) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Flappy Bird - Ved Games Production">
<meta name="twitter:description" content="Play Flappy Bird online free browser game.">
<meta name="twitter:image" content="https://devtiwari-bit.github.io/FLAPPY-BIRD/preview.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(to bottom,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* INTRO */

#intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:99999;

    animation:introFade 3.5s forwards;
}

#introLogo{
    font-size:70px;
    font-weight:900;
    color:white;

    letter-spacing:6px;

    text-shadow:
    0 0 10px #38bdf8,
    0 0 30px #38bdf8,
    0 0 60px #38bdf8;

    animation:logoPop 1.5s ease;
}

#introText{
    margin-top:12px;

    font-size:24px;

    letter-spacing:10px;

    color:#dbeafe;

    animation:fadeUp 2s ease;
}

#randomSlogan{
    margin-top:28px;

    color:white;

    font-size:18px;

    letter-spacing:2px;

    opacity:0.95;

    text-align:center;

    padding:0 20px;

    animation:sloganFade 2.2s ease;
}

@keyframes logoPop{

    0%{
        transform:scale(0.3) rotate(-10deg);
        opacity:0;
    }

    60%{
        transform:scale(1.15) rotate(3deg);
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeUp{

    0%{
        transform:translateY(40px);
        opacity:0;
    }

    100%{
        transform:translateY(0);
        opacity:1;
    }
}

@keyframes sloganFade{

    0%{
        opacity:0;
        transform:translateY(20px);
    }

    100%{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes introFade{

    0%{
        opacity:1;
        visibility:visible;
    }

    80%{
        opacity:1;
    }

    100%{
        opacity:0;
        visibility:hidden;
        pointer-events:none;
    }
}

/* GAME */

#game{
    width:420px;
    height:700px;

    max-width:100vw;
    max-height:100vh;

    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
        to bottom,
        #70c5ff 0%,
        #9be7ff 45%,
        #d6f5ff 100%
    );

    border-radius:22px;

    box-shadow:
    0 0 30px rgba(0,0,0,0.35);
}

/* SUN */

.sun{
    position:absolute;
    width:120px;
    height:120px;

    background:#ffe066;

    border-radius:50%;

    top:40px;
    right:40px;

    box-shadow:
    0 0 50px #ffe066;

    animation:sunGlow 3s infinite alternate;
}

@keyframes sunGlow{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

/* CLOUDS */

.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.9;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud1{
    width:120px;
    height:40px;

    top:90px;
    left:-150px;

    animation:moveCloud 18s linear infinite;
}

.cloud1::before{
    width:50px;
    height:50px;

    top:-20px;
    left:15px;
}

.cloud1::after{
    width:60px;
    height:60px;

    top:-25px;
    right:15px;
}

.cloud2{
    width:160px;
    height:50px;

    top:180px;
    left:-220px;

    animation:moveCloud 25s linear infinite;
}

.cloud2::before{
    width:60px;
    height:60px;

    top:-20px;
    left:20px;
}

.cloud2::after{
    width:70px;
    height:70px;

    top:-30px;
    right:20px;
}

@keyframes moveCloud{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(750px);
    }
}

/* GROUND */

#ground{
    position:absolute;
    bottom:0;

    width:200%;
    height:110px;

    background:
    repeating-linear-gradient(
        45deg,
        #43a047,
        #43a047 20px,
        #4caf50 20px,
        #4caf50 40px
    );

    animation:groundMove 2s linear infinite;
}

@keyframes groundMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-200px);
    }
}

/* BIRD */

#bird{
    width:42px;
    height:42px;

    background:
    linear-gradient(
        145deg,
        #ffd54f,
        #ff9800
    );

    border-radius:50%;

    position:absolute;
    left:90px;
    top:260px;

    transition:transform 0.1s;

    box-shadow:
    0 6px 10px rgba(0,0,0,0.2);
}

#bird::before{
    content:"";
    position:absolute;

    width:15px;
    height:15px;

    background:white;

    border-radius:50%;

    top:10px;
    right:8px;
}

#bird::after{
    content:"";
    position:absolute;

    width:7px;
    height:7px;

    background:black;

    border-radius:50%;

    top:14px;
    right:12px;
}

.wing{
    position:absolute;

    width:22px;
    height:14px;

    background:#ffca28;

    border-radius:50%;

    left:-4px;
    top:18px;

    transform-origin:right center;

    animation:flap 0.18s infinite alternate;
}

@keyframes flap{

    from{
        transform:rotate(-20deg);
    }

    to{
        transform:rotate(25deg);
    }
}

/* PIPES */

.pipe{
    position:absolute;

    width:80px;

    background:
    linear-gradient(
        to right,
        #43a047,
        #66bb6a,
        #43a047
    );

    border:4px solid #2e7d32;

    border-radius:10px;
}

.pipe::before{
    content:"";

    position:absolute;

    width:100%;
    height:25px;

    background:#66bb6a;

    left:-4px;

    border:4px solid #2e7d32;

    border-radius:10px;
}

.topPipe::before{
    bottom:0;
}

.bottomPipe::before{
    top:0;
}

/* SCORE */

#score{
    position:absolute;

    top:20px;

    width:100%;

    text-align:center;

    font-size:60px;
    font-weight:bold;

    color:white;

    text-shadow:
    3px 3px 8px rgba(0,0,0,0.4);
}

/* START / GAME OVER */

#startText{
    position:absolute;

    width:100%;

    top:48%;

    text-align:center;

    color:white;

    font-size:30px;
    font-weight:bold;

    text-shadow:
    2px 2px 8px rgba(0,0,0,0.5);

    animation:pulse 1.2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

/* BRAND */

#brand{
    position:absolute;

    bottom:15px;

    width:100%;

    text-align:center;

    color:white;

    font-size:18px;
    font-weight:bold;

    text-shadow:
    1px 1px 5px rgba(0,0,0,0.5);
}

#slogan{
    position:absolute;

    bottom:42px;

    width:100%;

    text-align:center;

    color:white;

    font-size:14px;

    letter-spacing:1px;

    opacity:0.9;
}

/* RESPONSIVE */

@media(max-width:500px){

    #game{
        width:100vw;
        height:100vh;
        border-radius:0;
    }
}

</style>
</head>

<body>
    <h1>Ved Games Production - Free Online Games</h1>

<p>Play Flappy Bird, Clicker Game and more fun browser games.</p>

<!-- INTRO -->

<div id="intro">

    <div id="introLogo">
        VEDGAMES
    </div>

    <div id="introText">
        PRODUCTION
    </div>

    <div id="randomSlogan"></div>

</div>

<!-- GAME -->

<div id="game">

    <div class="sun"></div>

    <div class="cloud cloud1"></div>

    <div class="cloud cloud2"></div>

    <div id="score">0</div>

    <div id="startText">
        TAP OR PRESS SPACE TO START
    </div>

    <div id="bird">

        <div class="wing"></div>

    </div>

    <div id="ground"></div>

    <div id="slogan">
        FLY HIGH • NEVER QUIT
    </div>

    <div id="brand">
        VEDGAMES
    </div>

</div>

<script>

/* RANDOM INTRO SLOGANS */

const slogans = [

    "PLAY • WIN • REPEAT",

    "FLY HIGH • NEVER QUIT",

    "LEGENDS NEVER STOP",

    "ONE MORE GAME ?",

    "GAMERS RULE THE SKY",

    "SKILL BEATS LUCK",

    "BORN TO PLAY"

];

document.getElementById("randomSlogan").innerText =

slogans[Math.floor(Math.random() * slogans.length)];

/* GAME */

const game = document.getElementById("game");

const bird = document.getElementById("bird");

const scoreText =
document.getElementById("score");

const startText =
document.getElementById("startText");

let birdY = 260;

let velocity = 0;

let gravity = 0.5;

let gameStarted = false;

let gameOver = false;

let score = 0;

let pipeInterval;

const pipes = [];

/* FLAP */

function flap(){

    if(!gameStarted){

        gameStarted = true;

        startText.style.display = "none";

        createPipes();
    }

    if(gameOver){

        restartGame();

        return;
    }

    velocity = -8;
}

document.addEventListener("keydown",e=>{

    if(e.code === "Space"){

        flap();
    }
});

document.addEventListener("click",flap);

document.addEventListener("touchstart",flap);

/* GAME LOOP */

function gameLoop(){

    if(gameStarted && !gameOver){

        velocity += gravity;

        birdY += velocity;

        bird.style.top = birdY + "px";

        bird.style.transform =
        `rotate(${velocity*3}deg)`;

        /* GROUND */

        if(
            birdY + 42 >=
            game.clientHeight - 110
        ){
            endGame();
        }

        /* TOP */

        if(birdY <= 0){

            birdY = 0;
        }

        pipes.forEach(pipePair=>{

            pipePair.x -= 2.8;

            pipePair.top.style.left =
            pipePair.x + "px";

            pipePair.bottom.style.left =
            pipePair.x + "px";

            /* SCORE */

            if(
                !pipePair.passed &&
                pipePair.x < 90
            ){

                pipePair.passed = true;

                score++;

                scoreText.innerText = score;
            }

            /* COLLISION */

            const birdRect =
            bird.getBoundingClientRect();

            const topRect =
            pipePair.top.getBoundingClientRect();

            const bottomRect =
            pipePair.bottom.getBoundingClientRect();

            if(

                birdRect.left < topRect.right &&

                birdRect.right > topRect.left &&

                (

                    birdRect.top < topRect.bottom ||

                    birdRect.bottom > bottomRect.top
                )

            ){

                endGame();
            }

        });

    }

    requestAnimationFrame(gameLoop);
}

/* CREATE PIPES */

function createPipes(){

    clearInterval(pipeInterval);

    pipeInterval = setInterval(()=>{

        if(gameOver) return;

        const gap = 190;

        const topHeight =
        Math.random()*250 + 80;

        const topPipe =
        document.createElement("div");

        topPipe.classList.add(
            "pipe",
            "topPipe"
        );

        topPipe.style.height =
        topHeight + "px";

        topPipe.style.left = "420px";

        topPipe.style.top = "0px";

        const bottomPipe =
        document.createElement("div");

        bottomPipe.classList.add(
            "pipe",
            "bottomPipe"
        );

        bottomPipe.style.height =

        (
            700 -
            topHeight -
            gap -
            110
        ) + "px";

        bottomPipe.style.left =
        "420px";

        bottomPipe.style.bottom =
        "110px";

        game.appendChild(topPipe);

        game.appendChild(bottomPipe);

        pipes.push({

            x:420,

            top:topPipe,

            bottom:bottomPipe,

            passed:false
        });

    },1700);
}

/* END GAME */

function endGame(){

    gameOver = true;

    startText.style.display =
    "block";

    startText.innerHTML =

    "GAME OVER<br><span style='font-size:22px'>Score: "

    + score +

    "<br><br>Tap To Retry</span>";
}

/* RETRY */

function restartGame(){

    birdY = 260;

    velocity = 0;

    score = 0;

    gameOver = false;

    scoreText.innerText = "0";

    startText.style.display = "none";

    bird.style.top = birdY + "px";

    pipes.forEach(pipePair=>{

        pipePair.top.remove();

        pipePair.bottom.remove();
    });

    pipes.length = 0;

    createPipes();
}

/* START LOOP */

gameLoop();

</script>

</body>
</html>
