<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy Bird - VED Production</title>

<!-- Preview when sharing -->
<meta property="og:title" content="Flappy Bird - VED Production">
<meta property="og:description" content="Play the smooth animated Flappy Bird game!">
<meta property="og:image" content="preview.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom,#4facfe,#00f2fe);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#game{
    width:420px;
    height:700px;
    max-width:100vw;
    max-height:100vh;
    background:linear-gradient(to bottom,#70c5ff 0%,#9be7ff 45%,#d6f5ff 100%);
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.35);
}

/* Sun */
.sun{
    position:absolute;
    width:120px;
    height:120px;
    background:#ffe066;
    border-radius:50%;
    top:40px;
    right:40px;
    box-shadow:0 0 50px #ffe066;
}

/* Clouds */
.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.9;
    animation:moveCloud 20s linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud1{
    width:120px;
    height:40px;
    top:90px;
    left:-150px;
}

.cloud1::before{
    width:50px;
    height:50px;
    top:-20px;
    left:15px;
}

.cloud1::after{
    width:60px;
    height:60px;
    top:-25px;
    right:15px;
}

.cloud2{
    width:150px;
    height:45px;
    top:180px;
    left:-200px;
    animation-duration:28s;
}

.cloud2::before{
    width:60px;
    height:60px;
    top:-20px;
    left:20px;
}

.cloud2::after{
    width:70px;
    height:70px;
    top:-30px;
    right:20px;
}

@keyframes moveCloud{
    from{ transform:translateX(0); }
    to{ transform:translateX(700px); }
}

/* Ground */
#ground{
    position:absolute;
    bottom:0;
    width:200%;
    height:110px;
    background:
    repeating-linear-gradient(
        45deg,
        #43a047,
        #43a047 20px,
        #4caf50 20px,
        #4caf50 40px
    );
    animation:groundMove 2s linear infinite;
}

@keyframes groundMove{
    from{ transform:translateX(0); }
    to{ transform:translateX(-200px); }
}

/* Bird */
#bird{
    width:52px;
    height:52px;
    background:linear-gradient(145deg,#ffd54f,#ff9800);
    border-radius:50%;
    position:absolute;
    left:90px;
    top:260px;
    transition:transform 0.1s;
    box-shadow:0 6px 10px rgba(0,0,0,0.2);
}

#bird::before{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:white;
    border-radius:50%;
    top:12px;
    right:10px;
}

#bird::after{
    content:"";
    position:absolute;
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
    top:17px;
    right:15px;
}

.wing{
    position:absolute;
    width:28px;
    height:18px;
    background:#ffca28;
    border-radius:50%;
    left:-5px;
    top:22px;
    transform-origin:right center;
    animation:flap 0.18s infinite alternate;
}

@keyframes flap{
    from{ transform:rotate(-20deg); }
    to{ transform:rotate(25deg); }
}

/* Pipes */
.pipe{
    position:absolute;
    width:80px;
    background:linear-gradient(to right,#43a047,#66bb6a,#43a047);
    border:4px solid #2e7d32;
    border-radius:10px;
}

.pipe::before{
    content:"";
    position:absolute;
    width:100%;
    height:25px;
    background:#66bb6a;
    left:-4px;
    border:4px solid #2e7d32;
    border-radius:10px;
}

.topPipe::before{
    bottom:0;
}

.bottomPipe::before{
    top:0;
}

/* Score */
#score{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 8px rgba(0,0,0,0.4);
}

/* Start Text */
#startText{
    position:absolute;
    width:100%;
    top:48%;
    text-align:center;
    color:white;
    font-size:30px;
    font-weight:bold;
    text-shadow:2px 2px 8px rgba(0,0,0,0.5);
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
}

/* Branding */
#brand{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-shadow:1px 1px 5px rgba(0,0,0,0.5);
}

#slogan{
    position:absolute;
    bottom:42px;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    letter-spacing:1px;
    opacity:0.9;
}

/* Responsive */
@media(max-width:500px){
    #game{
        width:100vw;
        height:100vh;
        border-radius:0;
    }
}
</style>
</head>
<body>

<div id="game">

    <div class="sun"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div id="score">0</div>

    <div id="startText">
        TAP OR PRESS SPACE TO START
    </div>

    <div id="bird">
        <div class="wing"></div>
    </div>

    <div id="ground"></div>

    <div id="slogan">FLY HIGH • NEVER QUIT</div>
    <div id="brand">VED Production</div>

</div>

<script>
const game = document.getElementById("game");
const bird = document.getElementById("bird");
const scoreText = document.getElementById("score");
const startText = document.getElementById("startText");

let birdY = 260;
let velocity = 0;
let gravity = 0.5;
let gameStarted = false;
let gameOver = false;
let score = 0;

const pipes = [];

function flap(){
    if(!gameStarted){
        gameStarted = true;
        startText.style.display = "none";
        createPipes();
    }

    if(gameOver){
        location.reload();
    }

    velocity = -8;
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space"){
        flap();
    }
});

document.addEventListener("click", flap);
document.addEventListener("touchstart", flap);

function gameLoop(){

    if(gameStarted && !gameOver){

        velocity += gravity;
        birdY += velocity;

        bird.style.top = birdY + "px";

        bird.style.transform = `rotate(${velocity*3}deg)`;

        // Ground collision
        if(birdY + 52 >= game.clientHeight - 110){
            endGame();
        }

        // Top collision
        if(birdY <= 0){
            birdY = 0;
        }

        pipes.forEach(pipePair=>{

            pipePair.x -= 2.8;

            pipePair.top.style.left = pipePair.x + "px";
            pipePair.bottom.style.left = pipePair.x + "px";

            // Score
            if(!pipePair.passed && pipePair.x < 90){
                pipePair.passed = true;
                score++;
                scoreText.innerText = score;
            }

            // Collision
            const birdRect = bird.getBoundingClientRect();
            const topRect = pipePair.top.getBoundingClientRect();
            const bottomRect = pipePair.bottom.getBoundingClientRect();

            if(
                birdRect.left < topRect.right &&
                birdRect.right > topRect.left &&
                (
                    birdRect.top < topRect.bottom ||
                    birdRect.bottom > bottomRect.top
                )
            ){
                endGame();
            }

        });

    }

    requestAnimationFrame(gameLoop);
}

function createPipes(){

    setInterval(()=>{

        if(gameOver) return;

        const gap = 180;
        const topHeight = Math.random()*250 + 80;

        const topPipe = document.createElement("div");
        topPipe.classList.add("pipe","topPipe");
        topPipe.style.height = topHeight + "px";
        topPipe.style.left = "420px";
        topPipe.style.top = "0px";

        const bottomPipe = document.createElement("div");
        bottomPipe.classList.add("pipe","bottomPipe");
        bottomPipe.style.height =
            (700 - topHeight - gap - 110) + "px";

        bottomPipe.style.left = "420px";
        bottomPipe.style.bottom = "110px";

        game.appendChild(topPipe);
        game.appendChild(bottomPipe);

        pipes.push({
            x:420,
            top:topPipe,
            bottom:bottomPipe,
            passed:false
        });

    }, 1700);

}

function endGame(){

    gameOver = true;

    startText.style.display = "block";
    startText.innerHTML =
        "GAME OVER<br><span style='font-size:22px'>Score: "
        + score +
        "<br>Tap To Restart</span>";
}

gameLoop();
</script>

</body>
</html>
